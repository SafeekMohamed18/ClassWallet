<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassWallet - Students</title>
    <link rel="icon" type="image/png" href="assets/images/Logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="assets/images/Logo.png" alt="ClassWallet Logo" width="30" height="30" class="logo-radius d-inline-block align-top me-2">
                ClassWallet
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="fas fa-tachometer-alt me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="students.html">
                            <i class="fas fa-users me-1"></i>Students
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="funds.html">
                            <i class="fas fa-money-bill-wave me-1"></i>Funds
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="reports.html">
                            <i class="fas fa-chart-bar me-1"></i>Reports
                        </a>
                    </li>
                </ul>
                <div class="d-flex">
                    <div id="user-info" class="d-none">
                        <span id="user-email" class="text-white me-2"></span>
                        <button id="signout-btn" class="btn btn-outline-light btn-sm">Sign Out</button>
                    </div>
                    <div id="signin-btn"></div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="auth-required" class="alert alert-warning d-none">
            <i class="fas fa-exclamation-triangle me-2"></i>
            Please sign in with your Google account to access ClassWallet.
        </div>

        <div id="main-content" class="d-none">
            <div class="row mb-4">
                <div class="col-12 d-flex justify-content-between align-items-center">
                    <div>
                        <h1 class="h3 mb-0">
                            <i class="fas fa-users me-2"></i>Student Management
                        </h1>
                        <p class="text-muted">Manage student details and payment status</p>
                    </div>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addStudentModal">
                        <i class="fas fa-plus me-1"></i>Add Student
                    </button>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-search"></i></span>
                        <input type="text" class="form-control" id="search-input" placeholder="Search students...">
                    </div>
                </div>
                <div class="col-md-6">
                    <select class="form-select" id="filter-select" disabled>
                        <option value="all">All Students</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped" id="students-table">
                            <thead>
                                <tr>
                                    <th>Reg No</th>
                                    <th>Name</th>
                                    <th>Mobile</th>
                                    <th>Email</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="5" class="text-center text-muted">Loading students...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Student Modal -->
    <div class="modal fade" id="addStudentModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Student</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="add-student-form">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="reg-no" class="form-label">Registration Number *</label>
                                <input type="text" class="form-control" id="reg-no" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="full-name" class="form-label">Full Name *</label>
                                <input type="text" class="form-control" id="full-name" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="mobile" class="form-label">Mobile Number</label>
                                <input type="tel" class="form-control" id="mobile">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="address" class="form-label">Address</label>
                            <textarea class="form-control" id="address" rows="2"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="guardian-name" class="form-label">Guardian Name</label>
                                <input type="text" class="form-control" id="guardian-name">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="guardian-mobile" class="form-label">Guardian Mobile Number</label>
                                <input type="tel" class="form-control" id="guardian-mobile">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="birthday" class="form-label">Birthday</label>
                                <input type="date" class="form-control" id="birthday">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="race" class="form-label">Race</label>
                                <select class="form-select" id="race">
                                    <option value="">Select...</option>
                                    <option value="Hindu">Hindu</option>
                                    <option value="Buddhist">Buddhist</option>
                                    <option value="Muslim">Muslim</option>
                                    <option value="Christian">Christian</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="notes" class="form-label">Additional Notes</label>
                            <textarea class="form-control" id="notes" rows="2" placeholder="Additional info, etc."></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="save-student-btn">Save Student</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Student Modal -->
    <div class="modal fade" id="editStudentModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Student</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-student-form">
                        <input type="hidden" id="edit-student-id">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="edit-reg-no" class="form-label">Registration Number *</label>
                                <input type="text" class="form-control" id="edit-reg-no" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="edit-full-name" class="form-label">Full Name *</label>
                                <input type="text" class="form-control" id="edit-full-name" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="edit-mobile" class="form-label">Mobile Number</label>
                                <input type="tel" class="form-control" id="edit-mobile">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="edit-email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="edit-email">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="edit-address" class="form-label">Address</label>
                            <textarea class="form-control" id="edit-address" rows="2"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="edit-guardian-name" class="form-label">Guardian Name</label>
                                <input type="text" class="form-control" id="edit-guardian-name">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="edit-guardian-mobile" class="form-label">Guardian Mobile Number</label>
                                <input type="tel" class="form-control" id="edit-guardian-mobile">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="edit-birthday" class="form-label">Birthday</label>
                                <input type="date" class="form-control" id="edit-birthday">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="edit-race" class="form-label">Race</label>
                                <select class="form-select" id="edit-race">
                                    <option value="">Select...</option>
                                    <option value="Hindu">Hindu</option>
                                    <option value="Buddhist">Buddhist</option>
                                    <option value="Muslim">Muslim</option>
                                    <option value="Christian">Christian</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="edit-notes" class="form-label">Additional Notes</label>
                            <textarea class="form-control" id="edit-notes" rows="2" placeholder="Additional info, etc."></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="update-student-btn">Update Student</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/students.js"></script>
</body>
</html>
