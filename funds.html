<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassWallet - Funds</title>
    <link rel="icon" type="image/png" href="assets/images/Logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 1080;">
        <div id="toast-container" class="toast-container"></div>
    </div>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="assets/images/Logo.png" alt="ClassWallet Logo" width="30" height="30" class="logo-radius d-inline-block align-top me-2">
                <span class="brand-class">Class</span><span class="brand-wallet">Wallet</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="fas fa-tachometer-alt me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="students.html">
                            <i class="fas fa-users me-1"></i>Students
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="funds.html">
                            <i class="fas fa-money-bill-wave me-1"></i>Funds
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="reports.html">
                            <i class="fas fa-chart-bar me-1"></i>Reports
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <div id="user-info" class="d-none">
                        <span id="user-email" class="text-muted me-3 small"></span>
                        <button id="signout-btn" class="btn btn-outline-danger btn-sm">Sign Out</button>
                    </div>
                    <div id="signin-btn"></div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="auth-required" class="alert alert-warning d-none">
            <i class="fas fa-exclamation-triangle me-2"></i>
            Please sign in with your Google account to access <span class="brand-class">Class</span><span class="brand-wallet">Wallet</span>.
        </div>

        <div id="main-content" class="d-none">
            <div class="row mb-4">
                <div class="col-12 d-flex justify-content-between align-items-center">
                    <div>
                        <h1 class="h3 mb-0">
                            <i class="fas fa-money-bill-wave me-2"></i>Fund Management
                        </h1>
                        <p class="text-muted">Record income and expenses</p>
                    </div>
                    <div>
                        <button class="btn btn-success me-2" data-bs-toggle="modal" data-bs-target="#addIncomeModal">
                            <i class="fas fa-plus me-1"></i>Add Income
                        </button>
                        <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#addExpenseModal">
                            <i class="fas fa-minus me-1"></i>Add Expense
                        </button>
                    </div>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-search"></i></span>
                        <input type="text" class="form-control" id="search-input" placeholder="Search transactions...">
                    </div>
                </div>
                <div class="col-md-6">
                    <select class="form-select" id="filter-select">
                        <option value="all">All Transactions</option>
                        <option value="income">Income Only</option>
                        <option value="expense">Expenses Only</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped" id="transactions-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Type</th>
                                    <th>Description</th>
                                    <th>Student</th>
                                    <th>Amount</th>
                                    <th>Added By</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="7" class="text-center text-muted">Loading transactions...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Income Modal -->
    <div class="modal fade" id="addIncomeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Income</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="add-income-form">
                        <div class="mb-3">
                            <label for="income-amount" class="form-label">Amount (Rs) *</label>
                            <input type="number" class="form-control" id="income-amount" step="0.01" min="0" required>
                        </div>
                        <div class="mb-3">
                            <label for="income-description" class="form-label">Description *</label>
                            <select class="form-select" id="income-description" required>
                                <option value="">Select description...</option>
                                <option value="Monthly">Monthly</option>
                                <option value="Special">Special</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="income-student" class="form-label">Student (Optional)</label>
                            <select class="form-select" id="income-student">
                                <option value="">Select student...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="income-date" class="form-label">Date *</label>
                            <input type="date" class="form-control" id="income-date" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" id="save-income-btn">Save Income</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Expense Modal -->
    <div class="modal fade" id="addExpenseModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Expense</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="add-expense-form">
                        <div class="mb-3">
                            <label for="expense-amount" class="form-label">Amount (Rs) *</label>
                            <input type="number" class="form-control" id="expense-amount" step="0.01" min="0" required>
                        </div>
                        <div class="mb-3">
                            <label for="expense-description" class="form-label">Description *</label>
                            <input type="text" class="form-control" id="expense-description" placeholder="Enter reason for expense" required>
                        </div>
                        <div class="mb-3">
                            <label for="expense-date" class="form-label">Date *</label>
                            <input type="date" class="form-control" id="expense-date" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="save-expense-btn">Save Expense</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/funds.js"></script>
</body>
</html>
